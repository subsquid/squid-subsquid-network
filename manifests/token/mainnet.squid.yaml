manifestVersion: subsquid.io/v0.1
name: sqd-token-mainnet
slot: v1
description: Subsquid network token indexer
build:
  package_manager: pnpm
deploy:
  addons:
    postgres:
  env:
    NETWORK: mainnet
    RPC_ENDPOINT: ${{ secrets.ARBITRUM_RPC_URL || 'https://arb1.arbitrum.io/rpc' }}
    PORTAL_ENDPOINT: ${{ 'https://portal.sqd.dev/datasets/arbitrum-one'}}
  processor:
    cmd:
      - pnpm
      - --dir
      - packages/token
      - exec
      - node
      - lib/main.js
  api:
    cmd:
      - pnpm
      - --dir
      - packages/token
      - exec
      - squid-graphql-server
      - --dumb-cache
      - in-memory
      - --dumb-cache-ttl
      - "1000"
      - --dumb-cache-size
      - "100"
      - --dumb-cache-max-age
      - "1000"
      - --no-squid-status
  init:
    cmd:
      - pnpm
      - --dir
      - packages/token
      - exec
      - squid-typeorm-migration
      - apply
scale:
  dedicated: true
  addons:
    postgres:
      storage: 10G
      profile: small
  processor:
    profile: small
  api:
    replicas: 2
