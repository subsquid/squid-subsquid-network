enum GatewayStatus {
  REGISTERED
  DEREGISTERED
  UNKNOWN
}

type Gateway @entity {
  id: ID!
  createdAt: DateTime!
  owner: String! @index
  stake: GatewayStake!
  status: GatewayStatus!
  statusHistory: [GatewayStatusChange!]! @derivedFrom(field: "gateway")
  name: String
  website: String
  email: String
  description: String
  endpointUrl: String
}

type GatewayStatusChange @entity {
  gateway: Gateway!
  status: GatewayStatus!
  timestamp: DateTime
  blockNumber: Int!
}

type GatewayStake @entity {
  id: ID!
  owner: String! @index
  autoExtension: Boolean!
  gateways: [Gateway!]! @derivedFrom(field: "stake")
  amount: BigInt!
  computationUnits: BigInt!
  computationUnitsPending: BigInt
  locked: Boolean!
  lockStart: Int
  lockEnd: Int
}

type PortalPool @entity {
  id: ID!
  createdAt: DateTime!
  createdAtBlock: Int!
  operator: String! @index
  rewardToken: String!
  capacity: BigInt!
  distributionRatePerSecond: BigInt!
  initialDeposit: BigInt!
  tokenSuffix: String!
  metadata: String
}
